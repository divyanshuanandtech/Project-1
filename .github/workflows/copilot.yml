name: CI Workflow

on:
  schedule:
    # Runs every day at 2:40 PM IST (09:10 UTC)
    - cron: '10 9 * * *'
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Change as needed

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

# Branching rules (enforced by workflow and repository settings):
# - Direct commits to main are discouraged; use PRs for all changes.
# - For branches other than main, contributors must create a pull request before merging.
#
# Customization notes:
# - Change the cron schedule to adjust run time.
# - Modify node-version for different Node.js versions.
# - Add steps for linting or deployment as needed.
